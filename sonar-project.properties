sonar.projectKey=AzTTeK_MiniMarket24
sonar.organization=azttek-1

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=MiniMarket24
sonar.projectVersion=1.0

# Encoding of the source code.
sonar.sourceEncoding=UTF-8

# Definición de archivos fuente y tests
# Nota: SonarCloud requiere que los sets de archivos sean disjuntos.
sonar.sources=logica_negocio, modulo_analitico
sonar.tests=logica_negocio/tests, modulo_analitico/tests

# Exclusiones de Análisis General (Evita el doble indexado de los tests en sources)
# Agregamos **/tests/** aquí para que NO se analicen como código fuente principal.
sonar.exclusions=**/tests/**, data/**, notebooks/**, visualizacion/**, Documents/**, *.py

# Exclusiones de Cobertura
# Esto asegura que los archivos de configuración e inicialización no bajen el promedio.
sonar.coverage.exclusions=**/tests/**, **/__init__.py, data/**, notebooks/**, visualizacion/**, Documents/**

# Exclusiones de Duplicación
sonar.cpd.exclusions=**/tests/**

# Coverage report path
sonar.python.coverage.reportPaths=coverage.xml
